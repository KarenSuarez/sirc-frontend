<div class="dashboard-container" *ngIf="usuario">
  <div class="dashboard-header">
    <h1>¡Bienvenido, {{ usuario.nombre }}!</h1>
    <p>Panel de Administración</p>
  </div>

  <div class="admin-grid">
    <nz-card nzTitle="Gestión de Usuarios" class="dashboard-card">
      <div class="card-content">
        <p>Crear y administrar usuarios del sistema</p>
        <button nz-button nzType="primary">
          <i nz-icon nzType="user-add"></i>
          Gestionar Usuarios
        </button>
      </div>
    </nz-card>

    <nz-card nzTitle="Configuración del Sistema" class="dashboard-card">
      <div class="card-content">
        <p>Configurar parámetros y ajustes generales</p>
        <button nz-button nzType="primary">
          <i nz-icon nzType="setting"></i>
          Configuración
        </button>
      </div>
    </nz-card>

    <nz-card nzTitle="Reportes Generales" class="dashboard-card">
      <div class="card-content">
        <p>Consulta reportes y métricas del sistema</p>
        <button nz-button nzType="primary" [routerLink]="['/reportes']">
          <i nz-icon nzType="bar-chart"></i>
          Ver Reportes
        </button>
      </div>
    </nz-card>
  </div>
</div>
